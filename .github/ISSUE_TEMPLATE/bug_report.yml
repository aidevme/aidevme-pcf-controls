name: Bug report
description: Report a problem with a PCF control
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: control
    attributes:
      label: Affected control
      description: Which PCF control is affected?
      options:
        - PCF Control 1
        - PCF Control 2
        - PCF Control 3
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: To reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Configure '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Power Apps environment, browser, and control version.
      placeholder: e.g. Model-driven app, Edge, control v1.0.0
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
    validations:
      required: false
